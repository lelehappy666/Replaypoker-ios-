name: RiverClub
options:
  bundleIdPrefix: com.dafengshuyi
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    SWIFT_VERSION: 6.0
packages:
  PokerCore:
    path: Packages/PokerCore
targets:
  RiverClub:
    type: application
    platform: iOS
    sources: [RiverClub]
    dependencies:
      - package: PokerCore
      - package: PokerCore
        product: PokerSession
      - package: PokerCore
        product: PokerBot
      - package: PokerCore
        product: PokerCoordinator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dafengshuyi.riverclub
        TARGETED_DEVICE_FAMILY: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  RiverClubTests:
    type: bundle.unit-test
    platform: iOS
    sources: [RiverClubTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: RiverClub
      - package: PokerCore
      - package: PokerCore
        product: PokerSession
      - package: PokerCore
        product: PokerBot
      - package: PokerCore
        product: PokerCoordinator
  RiverClubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [RiverClubUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies: [{target: RiverClub}]
